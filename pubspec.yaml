name: flutter_boilerplate
description: Production Flutter starter — Riverpod, go_router, Dio, secure storage, theming.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP client
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Local storage
  shared_preferences: ^2.2.3

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Environment config
  envied: ^0.5.3

  # UI utilities
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  gap: ^3.0.1
  shimmer: ^3.0.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  envied_generator: ^0.5.3

  # Testing
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
